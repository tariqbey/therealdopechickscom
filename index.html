<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dope Chicks" />

    <meta name="description" content="AI-powered creator platform" />

    <meta property="og:title" content="Dope Chicks" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <!-- Splash/loading screen -->
    <div id="splash-screen" style="position:fixed;inset:0;z-index:9999;background:#0a0a0a;display:flex;align-items:center;justify-content:center;">
      <img src="/icon-512.png" alt="Loading" style="width:160px;height:160px;object-fit:contain;animation:splash-pulse 1.8s ease-in-out infinite;" />
      <style>
        @keyframes splash-pulse {
          0%, 100% { opacity: 0.5; transform: scale(0.92); }
          50% { opacity: 1; transform: scale(1.05); }
        }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove splash once React mounts
      const observer = new MutationObserver(() => {
        if (document.getElementById('root')?.children.length) {
          const s = document.getElementById('splash-screen');
          if (s) { s.style.transition = 'opacity 0.4s'; s.style.opacity = '0'; setTimeout(() => s.remove(), 400); }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
